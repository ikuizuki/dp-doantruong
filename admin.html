<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
  </head>

  <body>
    <h2>Admin Dashboard</h2>

    <input id="title" placeholder="Tên hoạt động" />

    <input id="date" placeholder="Ngày" />

    <input id="location" placeholder="Địa điểm" />

    <textarea id="description"></textarea>

    <br /><br />

    <button onclick="addActivity()">Đăng hoạt động</button>

    <br /><br />

    <input type="file" id="image" />

    <button onclick="uploadImage()">Upload ảnh</button>

    <script>
      async function addActivity() {
        await fetch("/api/addActivity", {
          method: "POST",

          headers: {
            "Content-Type": "application/json",
          },

          body: JSON.stringify({
            title: document.getElementById("title").value,
            date: document.getElementById("date").value,
            location: document.getElementById("location").value,
            description: document.getElementById("description").value,
          }),
        });

        alert("Đăng thành công");
      }

      async function uploadImage() {
        const file = document.getElementById("image").files[0];

        const form = new FormData();

        form.append("image", file);

        await fetch("/api/upload", {
          method: "POST",
          body: form,
        });

        alert("Upload thành công");
      }
    </script>
  </body>
</html>
