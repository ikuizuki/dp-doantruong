<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Admin Login</title>

    <style>
      body {
        font-family: Arial;
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .login-box {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 300px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      .login-box h2 {
        text-align: center;
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 6px;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #1976d2;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #125aa3;
      }

      #msg {
        color: red;
        text-align: center;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <div class="login-box">
      <h2>Admin Login</h2>

      <input id="username" placeholder="Username" />

      <input id="password" type="password" placeholder="Password" />

      <button onclick="login()">Đăng nhập</button>

      <p id="msg"></p>
    </div>

    <script src="../js/login-code.js"></script>
  </body>
</html>
