<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Đoàn Trường</title>

    <link rel="stylesheet" href="/css/style.css" />
    <link rel="icon" type="image/png" href="../pic/favicon.png" />
  </head>

  <body>
    <header class="header">
      <div class="logo">
        <img src="../pic/logo.png" />
        <h1>ĐOÀN TRƯỜNG</h1>
      </div>

      <div class="header-search">
        <input type="text" id="searchInput" placeholder="🔎 Tìm hoạt động..." />
      </div>

      <nav>
        <a href="#home">Trang chủ</a>
        <a href="#activities">Thông báo</a>
        <a href="#checklist">Check list</a>
        <a href="login.html">Admin</a>
      </nav>
    </header>

    <!-- BANNER SLIDESHOW -->

    <section class="banner">
      <div class="banner-overlay">
        <h2>Trang thông tin Đoàn Thanh Niên</h2>

        <p>Cập nhật các hoạt động mới nhất</p>
      </div>
    </section>

    <!-- THÔNG BÁO -->

    <section class="announcement">
      <h2>📢 Thông báo nổi bật</h2>

      <div id="announcement-list"></div>
    </section>

    <!-- HOẠT ĐỘNG -->

    <section id="activities" class="activities">
      <h2>Hoạt động</h2>

      <div id="activities-list" class="activity-grid"></div>
    </section>

    <!-- checklist -->

    <section id="checklist" class="checklist">
      <h2>Lịch sử hoạt động</h2>

      <div id="checklist-list"></div>
    </section>

    <footer>
      <p>Đoàn Thanh Niên</p>
    </footer>

    <script src="../js/script.js"></script>
  </body>
</html>
