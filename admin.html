<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="admin.css" />
  </head>

  <body>
    <div class="admin-container">
      <h1>Admin Dashboard</h1>

      <div class="admin-card">
        <h2>Thêm hoạt động</h2>

        <input id="title" placeholder="Tên hoạt động" />

        <input id="date" type="date" />

        <input id="location" placeholder="Địa điểm" />

        <textarea id="description" placeholder="Mô tả hoạt động"></textarea>

        <input type="file" id="image" />

        <button onclick="addActivity()">Đăng hoạt động</button>
      </div>

      <div class="admin-card">
        <h2>Danh sách hoạt động</h2>

        <div id="activity-list"></div>
      </div>
    </div>

    <script src="admin.js"></script>
  </body>
</html>
